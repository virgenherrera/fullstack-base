name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      root-config: ${{ steps.filter.outputs.root-config }}
      apps-api: ${{ steps.filter.outputs.apps-api }}
      apps-web: ${{ steps.filter.outputs.apps-web }}
      packages-api-contract: ${{ steps.filter.outputs.packages-api-contract }}
      quality-api: ${{ steps.filter.outputs.quality-api }}
      quality-web: ${{ steps.filter.outputs.quality-web }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            root-config:
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.*'
            apps-api:
              - 'apps/api/**'
            apps-web:
              - 'apps/web/**'
            packages-api-contract:
              - 'packages/api-contract/**'
            quality-api:
              - 'quality/api/**'
            quality-web:
              - 'quality/web/**'

  static-analysis:
    name: Static Analysis & Types
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: test:static
        run: |
          pnpm run test:static
          echo "✅ **test:static** passed" >> $GITHUB_STEP_SUMMARY
      - name: test:types
        run: |
          pnpm run test:types
          echo "✅ **test:types** passed" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build
    needs: [changes, static-analysis]
    if: >-
      needs.changes.outputs.root-config == 'true' ||
      needs.changes.outputs.apps-api == 'true' ||
      needs.changes.outputs.apps-web == 'true' ||
      needs.changes.outputs.packages-api-contract == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: build
        run: |
          pnpm run build
          echo "✅ **build** passed" >> $GITHUB_STEP_SUMMARY
      - name: Upload web artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: artifacts/web/
          retention-days: 1
      - name: Upload api artifacts
        uses: actions/upload-artifact@v7
        with:
          name: api-build
          path: apps/api/artifacts/dist/
          retention-days: 1

  unit-tests:
    name: Unit Tests
    needs: [changes, static-analysis]
    if: >-
      needs.changes.outputs.root-config == 'true' ||
      needs.changes.outputs.apps-api == 'true' ||
      needs.changes.outputs.packages-api-contract == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: test:unit
        run: |
          pnpm run test:unit
          echo "✅ **test:unit** passed" >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    name: E2E Tests
    needs: [changes, build]
    if: >-
      needs.changes.outputs.root-config == 'true' ||
      needs.changes.outputs.apps-api == 'true' ||
      needs.changes.outputs.apps-web == 'true' ||
      needs.changes.outputs.packages-api-contract == 'true' ||
      needs.changes.outputs.quality-web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: artifacts/web/
      - name: Download api artifacts
        uses: actions/download-artifact@v8
        with:
          name: api-build
          path: apps/api/artifacts/dist/
      - name: Install Playwright browsers
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          pnpm dlx playwright install --with-deps chromium
      - name: test:e2e
        run: |
          pnpm run test:e2e
          echo "✅ **test:e2e** passed" >> $GITHUB_STEP_SUMMARY
