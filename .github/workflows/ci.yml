name: Continuous Integration

on:
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: test:static
        run: |
          pnpm run test:static
          echo "✅ **test:static** passed" >> $GITHUB_STEP_SUMMARY

      - name: test:types
        run: |
          pnpm run test:types
          echo "✅ **test:types** passed" >> $GITHUB_STEP_SUMMARY

      - name: build:contracts
        run: |
          pnpm run build:contracts
          echo "✅ **build:contracts** passed" >> $GITHUB_STEP_SUMMARY

      - name: Install Playwright browsers
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          pnpm dlx playwright install --with-deps chromium

      - name: test:dynamic
        timeout-minutes: 15
        run: |
          pnpm run test:dynamic
          echo "✅ **test:dynamic** passed" >> $GITHUB_STEP_SUMMARY

      - name: build
        run: |
          pnpm run build
          echo "✅ **build** passed" >> $GITHUB_STEP_SUMMARY
